name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Static frontend syntax check
        run: node --check src/main/resources/static/app.js

      - name: Maven verify
        run: mvn -B -ntp verify

      - name: Docker build validation
        run: docker build --pull --tag council-ci:${{ github.sha }} .

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: target/site/jacoco/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload CycloneDX SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: |
            target/classes/META-INF/sbom/bom.json
            target/classes/META-INF/sbom/bom.xml
          if-no-files-found: error
          retention-days: 30

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0

  dependency-check:
    name: dependency-check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache OWASP dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-

      - name: OWASP dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          extra_args=()
          if [[ -n "${NVD_API_KEY:-}" ]]; then
            extra_args+=("-DnvdApiKeyEnvironmentVariable=NVD_API_KEY")
          fi
          mvn -B -ntp -DskipTests dependency-check:check "${extra_args[@]}"

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check-report.*
          if-no-files-found: ignore
          retention-days: 14
