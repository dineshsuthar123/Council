version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      spring-stack:
        patterns:
          - org.springframework.boot:*
          - org.springframework:*
          - org.springdoc:*
      test-tooling:
        patterns:
          - org.junit.jupiter:*
          - org.mockito:*
          - org.assertj:*
          - com.h2database:*
      build-security-tooling:
        patterns:
          - org.jacoco:*
          - org.owasp:*
          - org.cyclonedx:*
          - org.apache.maven.plugins:*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
