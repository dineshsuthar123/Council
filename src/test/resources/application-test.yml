spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

council:
  security:
    admin-username: admin
    admin-password: test-admin-password
  providers:
    # ── Active providers (all disabled for unit tests — live test overrides) ──
    nvidia:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19090
      model: meta/llama-3.3-70b-instruct
      timeout-seconds: 5
      reliability: 0.88
      max-tokens: 512
    nvidia-deepseek:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19091
      model: deepseek-ai/deepseek-v3.2
      timeout-seconds: 5
      reliability: 0.85
      max-tokens: 512
    openrouter:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19092
      model: nvidia/llama-3.1-nemotron-70b-instruct
      timeout-seconds: 5
      reliability: 0.87
      max-tokens: 512
    openrouter-qwen:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19093
      model: qwen/qwen-2.5-72b-instruct
      timeout-seconds: 5
      reliability: 0.83
      max-tokens: 512
    deepseek-r1:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19094
      model: deepseek-reasoner
      timeout-seconds: 5
      reliability: 0.90
      max-tokens: 512
    # ── Legacy providers (must remain declared so adapters have a config block) ──
    claude:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19081
      model: blackboxai/anthropic/claude-sonnet-test
      timeout-seconds: 5
      reliability: 0.90
      max-tokens: 512
    gemini:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19082
      model: gemini-test
      timeout-seconds: 5
      reliability: 0.85
      max-tokens: 512
    deepseek:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19083
      model: deepseek-test
      timeout-seconds: 5
      reliability: 0.75
      max-tokens: 512
    groq:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19085
      model: groq-test
      timeout-seconds: 5
      reliability: 0.80
      max-tokens: 512
    together:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19086
      model: together-test
      timeout-seconds: 5
      reliability: 0.78
      max-tokens: 512
    mistral:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19087
      model: mistral-test
      timeout-seconds: 5
      reliability: 0.82
      max-tokens: 512
    kimi:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19088
      model: kimi-test
      timeout-seconds: 5
      reliability: 0.78
      max-tokens: 512
    huggingface:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19089
      model: hf-test
      timeout-seconds: 5
      reliability: 0.60
      max-tokens: 512
  critic:
    provider: openrouter
  synthesizer:
    provider: openrouter
  orchestrator:
    max-retries: 1
    cooldown-minutes: 1
    consecutive-429-threshold: 3
    draft-timeout-seconds: 10
    critic-timeout-seconds: 10
    verifier-timeout-seconds: 5
    synthesis-timeout-seconds: 5
    request-timeout-seconds: 20
    per-provider-deadline-seconds: 5
    early-stop-enabled: false
  routing:
    enabled: false
