spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

council:
  providers:
    claude:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19081
      model: claude-test
      timeout-seconds: 5
      reliability: 0.90
      max-tokens: 512
    gemini:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19082
      model: gemini-test
      timeout-seconds: 5
      reliability: 0.85
      max-tokens: 512
    deepseek:
      enabled: false
      api-key: test-key
      base-url: http://localhost:19083
      model: deepseek-test
      timeout-seconds: 5
      reliability: 0.75
      max-tokens: 512
  critic:
    provider: claude
  orchestrator:
    max-retries: 1
    cooldown-minutes: 1
    consecutive-429-threshold: 3
    draft-timeout-seconds: 10
    critic-timeout-seconds: 10

