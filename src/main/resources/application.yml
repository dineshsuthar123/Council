server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: council
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/council
    username: ${DB_USERNAME:council}
    password: ${DB_PASSWORD:council}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: council

logging:
  pattern:
    console: "%d{ISO8601} [%thread] [requestId=%X{requestId:-}] [traceId=%X{traceId:-}] [provider=%X{provider:-}] %-5level %logger{36} - %msg%n"
  level:
    com.council: INFO

# ── OpenAPI / Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Council Configuration ──
council:
  providers:
    claude:
      enabled: true
      api-key: ${CLAUDE_API_KEY:}
      base-url: https://api.anthropic.com
      model: claude-sonnet-4-20250514
      timeout-seconds: 60
      reliability: 0.90
      max-tokens: 4096
    gemini:
      enabled: true
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com
      model: gemini-2.5-pro
      timeout-seconds: 60
      reliability: 0.85
      max-tokens: 4096
    deepseek:
      enabled: true
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
      timeout-seconds: 60
      reliability: 0.75
      max-tokens: 4096
  critic:
    provider: claude
  orchestrator:
    max-retries: 2
    cooldown-minutes: 15
    consecutive-429-threshold: 3
    draft-timeout-seconds: 90
    critic-timeout-seconds: 120


