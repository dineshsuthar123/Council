
services:
  postgres:
    image: postgres:16-alpine
    container_name: council-db
    environment:
      POSTGRES_DB: council
      POSTGRES_USER: council
      POSTGRES_PASSWORD: council
    ports:
      - "5433:5432"
    volumes:
      - council-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U council"]
      interval: 5s
      timeout: 3s
      retries: 5

  council:
    build: .
    container_name: council-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/council
      DB_USERNAME: council
      DB_PASSWORD: council
      COUNCIL_ADMIN_USERNAME: ${COUNCIL_ADMIN_USERNAME:-admin}
      COUNCIL_ADMIN_PASSWORD: ${COUNCIL_ADMIN_PASSWORD:-}
      COUNCIL_PROVIDER_MODE: ${COUNCIL_PROVIDER_MODE:-free_first}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-2048}
      OLLAMA_PREFLIGHT_ENABLED: ${OLLAMA_PREFLIGHT_ENABLED:-false}
      OLLAMA_PREFLIGHT_TIMEOUT_MS: ${OLLAMA_PREFLIGHT_TIMEOUT_MS:-10000}
      OLLAMA_PREFLIGHT_NUM_PREDICT: ${OLLAMA_PREFLIGHT_NUM_PREDICT:-8}
      LOCAL_ONLY_REQUEST_TIMEOUT_SECONDS: ${LOCAL_ONLY_REQUEST_TIMEOUT_SECONDS:-180}
      LOCAL_ONLY_DRAFT_TIMEOUT_SECONDS: ${LOCAL_ONLY_DRAFT_TIMEOUT_SECONDS:-120}
      LOCAL_ONLY_PER_PROVIDER_DEADLINE_SECONDS: ${LOCAL_ONLY_PER_PROVIDER_DEADLINE_SECONDS:-90}
      OLLAMA_QWEN_CODER_ENABLED: ${OLLAMA_QWEN_CODER_ENABLED:-true}
      OLLAMA_QWEN_CODER_MODEL: ${OLLAMA_QWEN_CODER_MODEL:-qwen2.5-coder:7b}
      OLLAMA_QWEN_CODER_TIMEOUT_MS: ${OLLAMA_QWEN_CODER_TIMEOUT_MS:-60000}
      OLLAMA_DEEPSEEK_ENABLED: ${OLLAMA_DEEPSEEK_ENABLED:-true}
      OLLAMA_DEEPSEEK_MODEL: ${OLLAMA_DEEPSEEK_MODEL:-deepseek-r1:8b}
      OLLAMA_DEEPSEEK_TIMEOUT_MS: ${OLLAMA_DEEPSEEK_TIMEOUT_MS:-90000}
      OLLAMA_LLAMA_ENABLED: ${OLLAMA_LLAMA_ENABLED:-true}
      OLLAMA_LLAMA_MODEL: ${OLLAMA_LLAMA_MODEL:-llama3.1:8b}
      OLLAMA_LLAMA_TIMEOUT_MS: ${OLLAMA_LLAMA_TIMEOUT_MS:-60000}
      OLLAMA_GEMMA_ENABLED: ${OLLAMA_GEMMA_ENABLED:-true}
      OLLAMA_GEMMA_MODEL: ${OLLAMA_GEMMA_MODEL:-gemma3:4b}
      OLLAMA_GEMMA_TIMEOUT_MS: ${OLLAMA_GEMMA_TIMEOUT_MS:-45000}
      # ── Final model stack ──
      NVIDIA_LLAMA_API_KEY: ${NVIDIA_LLAMA_API_KEY:-}
      NVIDIA_DEEPSEEK_API_KEY: ${NVIDIA_DEEPSEEK_API_KEY:-}
      OPENROUTER_NEMOTRON_API_KEY: ${OPENROUTER_NEMOTRON_API_KEY:-}
      OPENROUTER_QWEN_API_KEY: ${OPENROUTER_QWEN_API_KEY:-}
      DEEPSEEK_R1_API_KEY: ${DEEPSEEK_R1_API_KEY:-}
      # ── Legacy (disabled but kept for compat) ──
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # Blackbox AI logical providers (disabled by default)
      BLACKBOX_ENABLED: ${BLACKBOX_ENABLED:-true}
      BLACKBOX_BASE_URL: ${BLACKBOX_BASE_URL:-https://api.blackbox.ai/chat/completions}
      BLACKBOX_PREFLIGHT_ENABLED: ${BLACKBOX_PREFLIGHT_ENABLED:-false}
      BLACKBOX_PREFLIGHT_TIMEOUT_MS: ${BLACKBOX_PREFLIGHT_TIMEOUT_MS:-10000}
      BLACKBOX_PREFLIGHT_MAX_TOKENS: ${BLACKBOX_PREFLIGHT_MAX_TOKENS:-8}
      BLACKBOX_GPT55_ENABLED: ${BLACKBOX_GPT55_ENABLED:-false}
      BLACKBOX_GPT55_API_KEY: ${BLACKBOX_GPT55_API_KEY:-}
      BLACKBOX_GPT55_MODEL: ${BLACKBOX_GPT55_MODEL:-blackboxai/openai/gpt-5.5}
      BLACKBOX_GPT55_TIMEOUT_MS: ${BLACKBOX_GPT55_TIMEOUT_MS:-60000}
      BLACKBOX_GPT55_PRO_ENABLED: ${BLACKBOX_GPT55_PRO_ENABLED:-false}
      BLACKBOX_GPT55_PRO_API_KEY: ${BLACKBOX_GPT55_PRO_API_KEY:-}
      BLACKBOX_GPT55_PRO_MODEL: ${BLACKBOX_GPT55_PRO_MODEL:-blackboxai/openai/gpt-5.4-pro}
      BLACKBOX_GPT55_PRO_TIMEOUT_MS: ${BLACKBOX_GPT55_PRO_TIMEOUT_MS:-90000}
      BLACKBOX_CLAUDE_SONNET_ENABLED: ${BLACKBOX_CLAUDE_SONNET_ENABLED:-false}
      BLACKBOX_CLAUDE_SONNET_API_KEY: ${BLACKBOX_CLAUDE_SONNET_API_KEY:-}
      BLACKBOX_CLAUDE_SONNET_MODEL: ${BLACKBOX_CLAUDE_SONNET_MODEL:-blackboxai/anthropic/claude-sonnet-4.6}
      BLACKBOX_CLAUDE_SONNET_TIMEOUT_MS: ${BLACKBOX_CLAUDE_SONNET_TIMEOUT_MS:-60000}
      BLACKBOX_CLAUDE_OPUS_ENABLED: ${BLACKBOX_CLAUDE_OPUS_ENABLED:-false}
      BLACKBOX_CLAUDE_OPUS_API_KEY: ${BLACKBOX_CLAUDE_OPUS_API_KEY:-}
      BLACKBOX_CLAUDE_OPUS_MODEL: ${BLACKBOX_CLAUDE_OPUS_MODEL:-blackboxai/anthropic/claude-opus-4.8}
      BLACKBOX_CLAUDE_OPUS_TIMEOUT_MS: ${BLACKBOX_CLAUDE_OPUS_TIMEOUT_MS:-90000}
      BLACKBOX_GEMINI_ENABLED: ${BLACKBOX_GEMINI_ENABLED:-false}
      BLACKBOX_GEMINI_API_KEY: ${BLACKBOX_GEMINI_API_KEY:-}
      BLACKBOX_GEMINI_MODEL: ${BLACKBOX_GEMINI_MODEL:-blackboxai/google/gemini-3.1-flash-lite}
      BLACKBOX_GEMINI_TIMEOUT_MS: ${BLACKBOX_GEMINI_TIMEOUT_MS:-45000}
      BLACKBOX_GEMINI_PRO_ENABLED: ${BLACKBOX_GEMINI_PRO_ENABLED:-false}
      BLACKBOX_GEMINI_PRO_API_KEY: ${BLACKBOX_GEMINI_PRO_API_KEY:-}
      BLACKBOX_GEMINI_PRO_MODEL: ${BLACKBOX_GEMINI_PRO_MODEL:-blackboxai/google/nano-banana-pro}
      BLACKBOX_GEMINI_PRO_TIMEOUT_MS: ${BLACKBOX_GEMINI_PRO_TIMEOUT_MS:-60000}
      BLACKBOX_NEMOTRON_ENABLED: ${BLACKBOX_NEMOTRON_ENABLED:-false}
      BLACKBOX_NEMOTRON_API_KEY: ${BLACKBOX_NEMOTRON_API_KEY:-}
      BLACKBOX_NEMOTRON_MODEL: ${BLACKBOX_NEMOTRON_MODEL:-blackboxai/nvidia/nemotron-3-ultra}
      BLACKBOX_NEMOTRON_TIMEOUT_MS: ${BLACKBOX_NEMOTRON_TIMEOUT_MS:-60000}
      BLACKBOX_DEEPSEEK_ENABLED: ${BLACKBOX_DEEPSEEK_ENABLED:-false}
      BLACKBOX_DEEPSEEK_API_KEY: ${BLACKBOX_DEEPSEEK_API_KEY:-}
      BLACKBOX_DEEPSEEK_MODEL: ${BLACKBOX_DEEPSEEK_MODEL:-blackboxai/deepseek/deepseek-v4-flash}
      BLACKBOX_DEEPSEEK_TIMEOUT_MS: ${BLACKBOX_DEEPSEEK_TIMEOUT_MS:-60000}
      BLACKBOX_GROK_ENABLED: ${BLACKBOX_GROK_ENABLED:-false}
      BLACKBOX_GROK_API_KEY: ${BLACKBOX_GROK_API_KEY:-}
      BLACKBOX_GROK_MODEL: ${BLACKBOX_GROK_MODEL:-blackboxai/x-ai/grok-4.3}
      BLACKBOX_GROK_TIMEOUT_MS: ${BLACKBOX_GROK_TIMEOUT_MS:-60000}

volumes:
  council-data:
