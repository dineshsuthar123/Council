
services:
  postgres:
    image: postgres:16-alpine
    container_name: council-db
    environment:
      POSTGRES_DB: council
      POSTGRES_USER: council
      POSTGRES_PASSWORD: council
    ports:
      - "5433:5432"
    volumes:
      - council-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U council"]
      interval: 5s
      timeout: 3s
      retries: 5

  council:
    build: .
    container_name: council-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/council
      DB_USERNAME: council
      DB_PASSWORD: council
      COUNCIL_ADMIN_USERNAME: ${COUNCIL_ADMIN_USERNAME:-admin}
      COUNCIL_ADMIN_PASSWORD: ${COUNCIL_ADMIN_PASSWORD:-}
      # ── Final model stack ──
      NVIDIA_LLAMA_API_KEY: ${NVIDIA_LLAMA_API_KEY:-}
      NVIDIA_DEEPSEEK_API_KEY: ${NVIDIA_DEEPSEEK_API_KEY:-}
      OPENROUTER_NEMOTRON_API_KEY: ${OPENROUTER_NEMOTRON_API_KEY:-}
      OPENROUTER_QWEN_API_KEY: ${OPENROUTER_QWEN_API_KEY:-}
      DEEPSEEK_R1_API_KEY: ${DEEPSEEK_R1_API_KEY:-}
      # ── Legacy (disabled but kept for compat) ──
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # Blackbox AI logical providers (disabled by default)
      BLACKBOX_ENABLED: ${BLACKBOX_ENABLED:-true}
      BLACKBOX_BASE_URL: ${BLACKBOX_BASE_URL:-https://api.blackbox.ai/chat/completions}
      BLACKBOX_GPT55_ENABLED: ${BLACKBOX_GPT55_ENABLED:-false}
      BLACKBOX_GPT55_API_KEY: ${BLACKBOX_GPT55_API_KEY:-}
      BLACKBOX_GPT55_MODEL: ${BLACKBOX_GPT55_MODEL:-blackboxai/openai/gpt-5.5}
      BLACKBOX_GPT55_PRO_ENABLED: ${BLACKBOX_GPT55_PRO_ENABLED:-false}
      BLACKBOX_GPT55_PRO_API_KEY: ${BLACKBOX_GPT55_PRO_API_KEY:-}
      BLACKBOX_GPT55_PRO_MODEL: ${BLACKBOX_GPT55_PRO_MODEL:-blackboxai/openai/gpt-5.5-pro}
      BLACKBOX_CLAUDE_SONNET_ENABLED: ${BLACKBOX_CLAUDE_SONNET_ENABLED:-false}
      BLACKBOX_CLAUDE_SONNET_API_KEY: ${BLACKBOX_CLAUDE_SONNET_API_KEY:-}
      BLACKBOX_CLAUDE_SONNET_MODEL: ${BLACKBOX_CLAUDE_SONNET_MODEL:-blackboxai/anthropic/claude-sonnet-4.6}
      BLACKBOX_CLAUDE_OPUS_ENABLED: ${BLACKBOX_CLAUDE_OPUS_ENABLED:-false}
      BLACKBOX_CLAUDE_OPUS_API_KEY: ${BLACKBOX_CLAUDE_OPUS_API_KEY:-}
      BLACKBOX_CLAUDE_OPUS_MODEL: ${BLACKBOX_CLAUDE_OPUS_MODEL:-blackboxai/anthropic/claude-opus-4.8}
      BLACKBOX_GEMINI_ENABLED: ${BLACKBOX_GEMINI_ENABLED:-false}
      BLACKBOX_GEMINI_API_KEY: ${BLACKBOX_GEMINI_API_KEY:-}
      BLACKBOX_GEMINI_MODEL: ${BLACKBOX_GEMINI_MODEL:-blackboxai/google/gemini-3.5-flash}
      BLACKBOX_GEMINI_PRO_ENABLED: ${BLACKBOX_GEMINI_PRO_ENABLED:-false}
      BLACKBOX_GEMINI_PRO_API_KEY: ${BLACKBOX_GEMINI_PRO_API_KEY:-}
      BLACKBOX_GEMINI_PRO_MODEL: ${BLACKBOX_GEMINI_PRO_MODEL:-blackboxai/google/gemini-3.1-pro-preview}
      BLACKBOX_NEMOTRON_ENABLED: ${BLACKBOX_NEMOTRON_ENABLED:-false}
      BLACKBOX_NEMOTRON_API_KEY: ${BLACKBOX_NEMOTRON_API_KEY:-}
      BLACKBOX_NEMOTRON_MODEL: ${BLACKBOX_NEMOTRON_MODEL:-blackboxai/nvidia/nemotron-3-ultra}
      BLACKBOX_DEEPSEEK_ENABLED: ${BLACKBOX_DEEPSEEK_ENABLED:-false}
      BLACKBOX_DEEPSEEK_API_KEY: ${BLACKBOX_DEEPSEEK_API_KEY:-}
      BLACKBOX_DEEPSEEK_MODEL: ${BLACKBOX_DEEPSEEK_MODEL:-blackboxai/deepseek/deepseek-v4-pro}
      BLACKBOX_GROK_ENABLED: ${BLACKBOX_GROK_ENABLED:-false}
      BLACKBOX_GROK_API_KEY: ${BLACKBOX_GROK_API_KEY:-}
      BLACKBOX_GROK_MODEL: ${BLACKBOX_GROK_MODEL:-blackboxai/x-ai/grok-4.3}

volumes:
  council-data:
