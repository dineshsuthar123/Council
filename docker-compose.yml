version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: council-db
    environment:
      POSTGRES_DB: council
      POSTGRES_USER: council
      POSTGRES_PASSWORD: council
    ports:
      - "5432:5432"
    volumes:
      - council-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U council"]
      interval: 5s
      timeout: 3s
      retries: 5

  council:
    build: .
    container_name: council-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/council
      DB_USERNAME: council
      DB_PASSWORD: council
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}

volumes:
  council-data:

